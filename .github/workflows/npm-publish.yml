name: Publish Node.js package to npm

on:
  push:
    branches: [main]
    paths:
      - 'nodejs/package.json'
      - 'nodejs/src/**'
      - 'include/logosdb/logosdb.h'
      - 'src/**'
    tags:
      - 'nodejs-v*'
  workflow_dispatch:

jobs:
  build-prebuilds:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            node: 20
          - os: macos-latest
            arch: x64
            node: 20
          - os: macos-14
            arch: arm64
            node: 20
          - os: windows-latest
            arch: x64
            node: 20
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake python3
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake || true
      - name: Install npm deps
        working-directory: ./nodejs
        run: npm install
        env:
          PYTHON: ${{ env.pythonLocation }}/bin/python
      - name: Generate prebuild
        working-directory: ./nodejs
        run: npm run prebuild
        env:
          PREBUILD_ARCH: ${{ matrix.arch }}
          PYTHON: ${{ env.pythonLocation }}/bin/python
      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.os }}-${{ matrix.arch }}
          path: nodejs/prebuilds/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24]
        exclude:
          - os: windows-latest
            node: 24
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build deps (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake python3
      - name: Install npm deps
        working-directory: ./nodejs
        run: npm install
        env:
          PYTHON: ${{ env.pythonLocation }}/bin/python
      - name: Build
        working-directory: ./nodejs
        run: npm run build
        env:
          PYTHON: ${{ env.pythonLocation }}/bin/python
      - name: Test
        working-directory: ./nodejs
        run: npm test

  publish-npm:
    needs: [build-prebuilds, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/nodejs-v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          path: nodejs/prebuilds/
          pattern: prebuild-*
          merge-multiple: true
      - name: Install deps
        working-directory: ./nodejs
        run: npm ci --ignore-scripts
      - name: Publish
        working-directory: ./nodejs
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
